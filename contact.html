<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Shankha Deep Swarnakar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow-blobs">
        <div class="glow-blob blob-cyan"></div>
        <div class="glow-blob blob-purple"></div>
        <div class="glow-blob blob-pink"></div>
    </div>
    <div class="bg-grid"></div>
    <nav class="site-nav">
        <a class="brand" href="index.html">
            <span class="brand-logo">SD</span>
            <span class="brand-name">Shankha Deep</span>
        </a>
        <div class="nav-links">
            <a href="index.html#projects">Projects</a>
            <a href="index.html#skills">Skills</a>
            <a href="index.html#experience">Experience</a>
            <a href="contact.html">Contact</a>
        </div>
        <a class="nav-cta" href="contact.html">
            Let's Connect
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="7" y1="17" x2="17" y2="7"></line>
                <polyline points="7 7 17 7 17 17"></polyline>
            </svg>
        </a>
    </nav>


    <main class="contact-page">
        <div class="contact-intro">
            <p class="eyebrow">Let's build something</p>
            <h1>Contact Me</h1>
            <p>Have an idea, project, or opportunity? Send a message and I will get back to you.</p>
        </div>

        <div class="contact-shell">
            <div class="contact-details">
                <article>
                    <span>Email</span>
                    <a href="mailto:swarnakarshankhadeep86@gmail.com">swarnakarshankhadeep86@gmail.com</a>
                </article>
                <article>
                    <span>Location</span>
                    <p>Kolkata, India</p>
                </article>
                <article>
                    <span>Response</span>
                    <p>Usually within 24 hours</p>
                </article>
            </div>

            <form class="contact-form" name="contactForm">
                <label>
                    <span>Name</span>
                    <input type="text" name="name" placeholder="Your name" required>
                </label>
                <label>
                    <span>Email</span>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </label>
                <label>
                    <span>Message</span>
                    <textarea name="message" placeholder="Tell me about your idea" required></textarea>
                </label>
                <button class="btn primary" type="submit">Send Message</button>
            </form>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
